<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neuropharmacology Quiz — 2017–2024</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f4ef;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --border: #e2ddd6;
    --text: #1c1a17;
    --text-soft: #6b6560;
    --text-muted: #9e9891;
    --accent: #2d6a4f;
    --accent-light: #e8f4ef;
    --accent-hover: #245a42;
    --wrong: #c0392b;
    --wrong-light: #fdf0ee;
    --wrong-border: #e8b4ae;
    --right: #1e7e5a;
    --right-light: #eaf6f0;
    --right-border: #a8d8c0;
    --warn: #b8860b;
    --warn-light: #fdf8e8;
    --year-tag: #5c6f82;
    --year-tag-bg: #e8edf2;
    --shadow: 0 2px 16px rgba(0,0,0,0.07);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
    --radius: 14px;
    --radius-sm: 8px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* ── HEADER ── */
  .header {
    background: var(--surface);
    border-bottom: 1.5px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 1px 8px rgba(0,0,0,0.05);
  }
  .header-title {
    font-family: 'Lora', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.2px;
  }
  .header-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .score-pill {
    background: var(--accent-light);
    border: 1.5px solid var(--right-border);
    border-radius: 24px;
    padding: 6px 18px;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ── PROGRESS BAR ── */
  .progress-wrap {
    background: var(--surface);
    padding: 0 32px 14px;
    border-bottom: 1px solid var(--border);
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11.5px;
    color: var(--text-muted);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .progress-bar-track {
    background: var(--surface2);
    border-radius: 999px;
    height: 6px;
    overflow: hidden;
  }
  .progress-bar-fill {
    background: linear-gradient(90deg, var(--accent), #52b788);
    height: 100%;
    border-radius: 999px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  /* ── MAIN ── */
  .main {
    max-width: 780px;
    margin: 0 auto;
    padding: 36px 24px 80px;
  }

  /* ── QUESTION CARD ── */
  .card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 36px 28px;
    box-shadow: var(--shadow);
    animation: slideIn 0.35s cubic-bezier(0.4,0,0.2,1);
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }
  .year-tag {
    background: var(--year-tag-bg);
    color: var(--year-tag);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .q-number {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
  }

  .q-text {
    font-family: 'Lora', serif;
    font-size: 17.5px;
    line-height: 1.65;
    color: var(--text);
    margin-bottom: 26px;
  }

  /* ── OPTIONS ── */
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 0;
  }

  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    cursor: pointer;
    font-size: 14.5px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    text-align: left;
    line-height: 1.5;
    transition: border-color 0.18s, background 0.18s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }
  .option-btn:not(.disabled):hover {
    border-color: var(--accent);
    background: var(--accent-light);
    transform: translateX(2px);
  }
  .option-letter {
    min-width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-soft);
    background: var(--surface2);
    flex-shrink: 0;
    margin-top: 0px;
    transition: all 0.18s;
  }
  .option-btn:not(.disabled):hover .option-letter {
    border-color: var(--accent);
    background: var(--accent);
    color: #fff;
  }

  /* correct */
  .option-btn.correct {
    border-color: var(--right-border);
    background: var(--right-light);
    animation: pulse-green 0.4s ease;
  }
  .option-btn.correct .option-letter {
    background: var(--right);
    border-color: var(--right);
    color: #fff;
  }
  @keyframes pulse-green {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.02); }
    100% { transform: scale(1); }
  }

  /* wrong */
  .option-btn.wrong {
    border-color: var(--wrong-border);
    background: var(--wrong-light);
    animation: shake 0.38s ease;
  }
  .option-btn.wrong .option-letter {
    background: var(--wrong);
    border-color: var(--wrong);
    color: #fff;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%     { transform: translateX(-5px); }
    60%     { transform: translateX(5px); }
    80%     { transform: translateX(-3px); }
  }

  /* missed (correct answer shown after wrong pick) */
  .option-btn.missed {
    border-color: var(--right-border);
    background: var(--right-light);
  }
  .option-btn.missed .option-letter {
    background: var(--right);
    border-color: var(--right);
    color: #fff;
  }

  .option-btn.disabled {
    cursor: default;
    pointer-events: none;
  }

  /* result badge */
  .result-badge {
    display: none;
    font-size: 12px;
    font-weight: 600;
    padding: 2px 10px;
    border-radius: 20px;
    margin-left: auto;
    align-self: center;
    flex-shrink: 0;
  }
  .correct .result-badge { display: block; background: var(--right); color: #fff; }
  .wrong .result-badge { display: block; background: var(--wrong); color: #fff; }
  .missed .result-badge { display: block; background: var(--right); color: #fff; }

  /* ── FEEDBACK PANEL ── */
  .feedback {
    margin-top: 22px;
    border-radius: var(--radius-sm);
    overflow: hidden;
    border: 1.5px solid transparent;
    display: none;
    animation: fadeUp 0.3s ease;
  }
  .feedback.show { display: block; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .feedback.correct-fb {
    border-color: var(--right-border);
    background: var(--right-light);
  }
  .feedback.wrong-fb {
    border-color: var(--wrong-border);
    background: var(--wrong-light);
  }
  .feedback-header {
    padding: 10px 16px;
    font-weight: 700;
    font-size: 13.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .correct-fb .feedback-header { color: var(--right); }
  .wrong-fb .feedback-header { color: var(--wrong); }

  .feedback-body {
    padding: 0 16px 14px;
    font-size: 13.5px;
    line-height: 1.65;
    color: var(--text);
    border-top: 1px solid var(--border);
  }
  .feedback-label {
    font-family: 'Lora', serif;
    font-weight: 600;
    font-size: 13px;
    color: var(--text-soft);
    margin: 12px 0 5px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-style: italic;
  }
  .verify-note {
    margin-top: 12px;
    padding: 10px 14px;
    background: var(--warn-light);
    border: 1px solid #e8d898;
    border-radius: 6px;
    font-size: 12.5px;
    color: var(--warn);
    line-height: 1.55;
  }
  .verify-note strong { font-weight: 700; }

  /* ── NEXT BUTTON ── */
  .nav-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 26px;
    gap: 12px;
  }
  .btn-next {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 12px 28px;
    font-size: 14px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.18s, transform 0.15s;
    letter-spacing: 0.2px;
  }
  .btn-next:hover { background: var(--accent-hover); transform: translateX(2px); }
  .btn-next:disabled { background: var(--text-muted); cursor: default; transform: none; }

  /* ── RESULTS SCREEN ── */
  #results-screen {
    display: none;
    text-align: center;
    padding: 60px 24px;
    animation: slideIn 0.4s ease;
  }
  .results-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px;
    max-width: 540px;
    margin: 0 auto;
    box-shadow: var(--shadow-lg);
  }
  .results-icon {
    font-size: 52px;
    margin-bottom: 16px;
  }
  .results-title {
    font-family: 'Lora', serif;
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--text);
  }
  .results-score {
    font-size: 52px;
    font-weight: 700;
    color: var(--accent);
    margin: 16px 0 8px;
    font-family: 'Lora', serif;
  }
  .results-sub {
    color: var(--text-soft);
    font-size: 15px;
    margin-bottom: 32px;
  }
  .results-stats {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-bottom: 32px;
  }
  .stat-pill {
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
  }
  .stat-pill.good { background: var(--right-light); color: var(--right); border: 1.5px solid var(--right-border); }
  .stat-pill.bad  { background: var(--wrong-light); color: var(--wrong); border: 1.5px solid var(--wrong-border); }
  .btn-restart {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 14px 36px;
    font-size: 15px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: background 0.18s;
    letter-spacing: 0.3px;
  }
  .btn-restart:hover { background: var(--accent-hover); }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .header { padding: 14px 16px; }
    .progress-wrap { padding: 0 16px 12px; }
    .main { padding: 20px 12px 60px; }
    .card { padding: 22px 18px 20px; }
    .q-text { font-size: 16px; }
    .option-btn { font-size: 13.5px; padding: 12px 14px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div>
    <div class="header-title">Neuropharmacology Quiz</div>
    <div class="header-sub">Past Papers 2017 – 2024</div>
  </div>
  <div class="score-pill">
    <span>Score</span>
    <span id="live-score">0 / 0</span>
  </div>
</div>

<!-- PROGRESS -->
<div class="progress-wrap">

    <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>

</div>

<!-- QUIZ AREA -->
<div class="main" id="quiz-area">

      <button class="btn-next" id="btn-next" disabled>Next →</button>

  </div>
</div>

<!-- RESULTS -->
<div id="results-screen">
  <div class="results-card">
    <div class="results-icon" id="results-icon">🎓</div>
    <div class="results-title">Quiz Complete!</div>
    <div class="results-score" id="results-score"></div>
    <div class="results-sub" id="results-sub"></div>
    <div class="results-stats">
      <div class="stat-pill good" id="stat-correct"></div>
      <div class="stat-pill bad"  id="stat-wrong"></div>
    </div>
    <button class="btn-restart" onclick="restart()">↺ Try Again</button>
  </div>
</div>

const QUESTIONS = [

    text: "An 18 year old girl was admitted to the hospital because she had paranoid delusions and auditory hallucination. She was given medications and the symptoms were treated. However soon she developed involuntary motor movements, the nurses had seen her moving her head to one side with jerking movements as well. What type of receptor did the drug block?",

    correct: 1,
    explanation: "The girl has psychosis (delusions + hallucinations) treated with an antipsychotic like Haloperidol. Antipsychotics block D2 (dopamine) receptors in the mesolimbic pathway to treat psychosis. The involuntary neck movements (acute dystonia) are extrapyramidal side effects from D2 blockade in the nigrostriatal pathway. Classic EPS presentation.",

    verify: null
  },
  {

    correct: 1,

  {

    text: "Valproic acid acts on the receptor of a major activating neurotransmitter. The neurotransmitter is converted by an enzymatic reaction to a major inhibitory neurotransmitter that is found in the cerebellar cortex. What neurotransmitter is formed?",

    text: "72-year-old man came with his daughter with pill rolling tremors, cog wheel rigidity, shuffling gait, and stooped posture. Which drug will inhibit metabolism of the neurotransmitter involved in the above case?",
    options: ["A. Amantadine", "B. Levodopa", "C. Benztropine", "D. Selegiline", "E. Carbidopa"],
    correct: 3,
    explanation: "Diagnosis = Parkinson's → dopamine deficiency. Selegiline is a selective MAO-B inhibitor. MAO-B degrades dopamine, so selegiline inhibits dopamine metabolism, increasing its availability. Carbidopa inhibits peripheral DOPA decarboxylase (not dopamine breakdown in the brain). Levodopa is a precursor, not a metabolism inhibitor.",

// ── STATE ──
let current = 0;
let score = 0;
let answered = 0;
let answered_arr = new Array(QUESTIONS.length).fill(false);

function render() {
  const q = QUESTIONS[current];
  document.getElementById('q-year').textContent = q.year;
  document.getElementById('q-num').textContent = `Question ${current + 1} of ${QUESTIONS.length} · ${q.qNum}`;
  document.getElementById('q-text').textContent = q.text;

  // options
  const container = document.getElementById('options');
  container.innerHTML = '';
  const letters = ['A','B','C','D','E','F','G','H'];
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${opt}</span><span class="result-badge"></span>`;
    if (!answered_arr[current]) {
      btn.addEventListener('click', () => choose(i, btn));
    } else {
      applyPreviousState(btn, i, q);
      btn.classList.add('disabled');
    }
    container.appendChild(btn);
  });

  // feedback
  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.style.display = '';
  if (answered_arr[current]) {
    showFeedback(q);
  }

  // next button
  const btnNext = document.getElementById('btn-next');
  btnNext.disabled = !answered_arr[current];
  btnNext.textContent = current === QUESTIONS.length - 1 ? 'Finish ✓' : 'Next →';

  // progress
  const pct = Math.round((current / QUESTIONS.length) * 100);
  document.getElementById('progress-text').textContent = `Question ${current + 1} of ${QUESTIONS.length}`;
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';

  // score
  document.getElementById('live-score').textContent = `${score} / ${answered}`;

  // re-animate card
  const card = document.getElementById('card');
  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = '';
}

function applyPreviousState(btn, idx, q) {
  // we don't track chosen per question, so just highlight correct
  if (idx === q.correct) btn.classList.add('missed');
}

function choose(idx, btn) {
  if (answered_arr[current]) return;
  const q = QUESTIONS[current];
  answered_arr[current] = true;
  answered++;

  const buttons = document.querySelectorAll('.option-btn');
  buttons.forEach(b => b.classList.add('disabled'));

  if (idx === q.correct) {
    score++;
    btn.classList.add('correct');
    btn.querySelector('.result-badge').textContent = '✓ Correct';
  } else {
    btn.classList.add('wrong');
    btn.querySelector('.result-badge').textContent = '✗ Wrong';
    buttons[q.correct].classList.add('missed');
    buttons[q.correct].querySelector('.result-badge').textContent = '✓ Correct';
  }

  showFeedback(q, idx === q.correct);
  document.getElementById('btn-next').disabled = false;
  document.getElementById('live-score').textContent = `${score} / ${answered}`;
}

function showFeedback(q, wasCorrect) {
  const fb = document.getElementById('feedback');
  const header = document.getElementById('fb-header');
  const body = document.getElementById('fb-body');

  const correct = wasCorrect !== undefined ? wasCorrect : true;
  fb.className = 'feedback show ' + (correct ? 'correct-fb' : 'wrong-fb');

  header.textContent = correct ? '✓  Correct!' : '✗  Incorrect';

  let html = `<div class="feedback-label">Explanation</div><p>${q.explanation}</p>`;
  if (q.verify) {
    html += `<div class="verify-note"><strong>⚠ Verify:</strong> ${q.verify}</div>`;
  }
  body.innerHTML = html;
}

document.getElementById('btn-next').addEventListener('click', () => {
  if (current < QUESTIONS.length - 1) {
    current++;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    showResults();
  }
});

function showResults() {
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('results-screen').style.display = 'block';

  const pct = Math.round((score / QUESTIONS.length) * 100);
  const wrong = QUESTIONS.length - score;

  let icon = '🎓', msg = '';
  if (pct >= 85) { icon = '🏆'; msg = 'Outstanding! You are exam-ready.'; }
  else if (pct >= 70) { icon = '🎓'; msg = 'Great job! Review the ones you missed.'; }
  else if (pct >= 50) { icon = '📖'; msg = 'Good effort — keep reviewing!'; }
  else { icon = '💪'; msg = 'Keep going — you\'ll get there!'; }

  document.getElementById('results-icon').textContent = icon;
  document.getElementById('results-score').textContent = `${score}/${QUESTIONS.length}`;
  document.getElementById('results-sub').textContent = `${pct}% — ${msg}`;
  document.getElementById('stat-correct').textContent = `✓ ${score} Correct`;
  document.getElementById('stat-wrong').textContent = `✗ ${wrong} Wrong`;
}

function restart() {
  current = 0; score = 0; answered = 0;
  answered_arr = new Array(QUESTIONS.length).fill(false);
  document.getElementById('quiz-area').style.display = 'block';
  document.getElementById('results-screen').style.display = 'none';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// init
render();
</script>
